<!DOCTYPE html>
<html>

<head>

<title>Query History</title>

<link rel="stylesheet" href="/css/style.css">

</head>


<body>

<div class="sidebar">

<h2>SDM System</h2>

<a href="dashboard.html">Dashboard</a>
<a href="query.html">Query</a>
<a href="manage.html">Manage Data</a>
<a href="history.html">Query History</a>

</div>



<div class="main">

<div class="card">

<h2>Query History</h2>

<table id="historyTable">

<thead>

<tr>
<th>ID</th>
<th>Query</th>
<th>Date</th>
</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</div>



<script>

window.onload=function(){

loadHistory();

}


function loadHistory(){

fetch("/api/history")

.then(res=>res.json())

.then(data=>{

let table=document.querySelector("#historyTable tbody");

table.innerHTML="";


data.forEach(row=>{

table.innerHTML+=

"<tr>"+

"<td>"+row.id+"</td>"+

"<td>"+row.queryText+"</td>"+

"<td>"+row.createdAt+"</td>"+

"</tr>";

});

})

.catch(err=>{

console.log("History load error",err);

});

}

</script>


</body>

</html>
