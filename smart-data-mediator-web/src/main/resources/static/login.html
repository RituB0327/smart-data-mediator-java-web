<!DOCTYPE html>
<html>

<head>

<title>SDM Login</title>

<link rel="stylesheet" href="/css/style.css">

<style>

/* LOGIN CONTAINER */

.container{
position:relative;
width:800px;
height:450px;
background:#2b2d3a;
border:2px solid #00c3ff;
box-shadow:0 0 25px #00c3ff;
overflow:hidden;
display:flex;
margin:auto;
}

/* BLUE DIAGONAL SHAPE */

.container::before{
content:'';
position:absolute;
top:0;
right:0;
width:600px;
height:100%;
background:linear-gradient(135deg,#00c3ff,#0056b3);
clip-path:polygon(25% 0,100% 0,100% 100%,0% 100%);
z-index:1;
}

/* FORM */

.form-box{
width:50%;
display:flex;
flex-direction:column;
justify-content:center;
padding:0 40px;
z-index:2;
color:white;
}

.form-box h2{
font-size:32px;
text-align:center;
margin-bottom:20px;
}

/* INPUT BOX */

.input-box{
position:relative;
width:100%;
height:50px;
border-bottom:2px solid white;
margin:30px 0;
}

.input-box input{
width:100%;
height:100%;
background:transparent;
border:none;
outline:none;
font-size:16px;
color:white;
padding:0 5px;
}

.input-box label{
position:absolute;
top:50%;
left:5px;
transform:translateY(-50%);
transition:.5s;
}

.input-box input:focus~label,
.input-box input:valid~label{
top:-5px;
}

/* BUTTON */

.btn{
width:100%;
height:45px;
background:linear-gradient(90deg,#0081ab,#00c3ff);
border:none;
border-radius:40px;
cursor:pointer;
font-size:16px;
color:white;
font-weight:600;
}

/* RIGHT SIDE INFO */

.info-content{
position:absolute;
right:0;
width:50%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:0 40px;
color:white;
z-index:2;
text-align:center;
}

.info-content h2{
font-size:36px;
}

.info-content p{
margin-top:10px;
}

</style>

</head>


<body>

<div class="container">

<div class="form-box">

<h2>Admin Login</h2>

<form action="/login" method="post">

<div class="input-box">

<input type="text" name="username" required>

<label>Username</label>

</div>

<div class="input-box">

<input type="password" name="password" required>

<label>Password</label>

</div>

<button class="btn">Login</button>

</form>

</div>


<div class="info-content">

<h2>Smart Data Mediator</h2>

<p>AI Powered Data Analytics Dashboard</p>

</div>

</div>

</body>

</html>
